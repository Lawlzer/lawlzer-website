# .github/workflows/deploy-staging.yml
name: Deploy to Staging EC2

on:
  push:
    branches:
      - staging

permissions:
  id-token: write # Required for OIDC authentication
  contents: read # Required to check out the code

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Configure AWS Credentials using OIDC
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::019997775122:role/lawlzer-website-staging-github-actions-role
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
        run: |
          # Run deployment commands on the EC2 instance
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /var/www/app",
              "git pull origin staging",
              "npm install --legacy-peer-deps",
              "npm run build",
              "pm2 restart lawlzer-website-staging"
            ]' \
            --output json > command-output.json

          # Get command ID
          COMMAND_ID=$(jq -r '.Command.CommandId' command-output.json)
          echo "Command ID: $COMMAND_ID"

          # Wait for command to complete
          echo "Waiting for deployment to complete..."
          sleep 10

          # Check command status
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --output json > invocation-output.json

          # Display status
          STATUS=$(jq -r '.Status' invocation-output.json)
          echo "Deployment Status: $STATUS"

          # If failed, show the error
          if [ "$STATUS" = "Failed" ]; then
            echo "Deployment failed!"
            jq -r '.StandardErrorContent' invocation-output.json
            exit 1
          fi

          echo "Deployment completed successfully!"

      - name: Verify Deployment
        run: |
          echo "Waiting for application to start..."
          sleep 30

          # Check if the site is accessible
          SITE_URL="http://13.216.140.18"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $SITE_URL || echo "000")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Site is accessible at $SITE_URL"
            echo "✅ Will be available at https://staging.lawlzer.com after DNS setup"
          else
            echo "⚠️ Site returned HTTP status: $HTTP_STATUS"
            echo "The application may still be starting up..."
          fi
